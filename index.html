<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ronas Candles</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: linear-gradient(to bottom, #7b1e3a, #3a0f1f);
  margin: 0;
  padding: 20px;
  color: white;
}

h1 {
  text-align: center;
  font-size: 32px;
  letter-spacing: 2px;
}

h2 {
  margin-top: 30px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.product {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.product:hover {
  transform: scale(1.05);
}

button {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: green; color: white; }
.remove { background: red; color: white; }
.qty { background: orange; color: white; }

#cart {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  list-style: none;
}
</style>

</head>

<body>

<h1>🤍 Ronas Candles</h1>

<h2>🕯️ الشموع</h2>
<div class="products">

<div class="product">
<h3>شمعة 1</h3>
<p>السعر: 0 ل.س</p>
<button class="add" onclick="addToCart('شمعة 1', 0)">أضف</button>
</div>

<div class="product">
<h3>شمعة 2</h3>
<p>السعر: 0 ل.س</p>
<button class="add" onclick="addToCart('شمعة 2', 0)">أضف</button>
</div>

</div>

<h2>🧱 منتجات الكونكريت</h2>
<div class="products">

<div class="product">
<h3>قطعة كونكريت 1</h3>
<p>السعر: 0 ل.س</p>
<button class="add" onclick="addToCart('كونكريت 1', 0)">أضف</button>
</div>

</div>

<h2>🛒 سلة المشتريات</h2>
<ul id="cart"></ul>
<button onclick="sendOrder()">إرسال الطلب</button>

<script>
let cart = [];

function addToCart(name, price) {
  let item = cart.find(i => i.name === name);
  if(item) {
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
}

function updateCart() {
  let cartEl = document.getElementById("cart");
  cartEl.innerHTML = "";

  cart.forEach((item, index) => {
    let li = document.createElement("li");
    li.innerHTML = 
      ${item.name} - ${item.qty} × ${item.price} ل.س
      <button class="qty" onclick="increase(${index})">+</button>
      <button class="qty" onclick="decrease(${index})">-</button>
      <button class="remove" onclick="removeItem(${index})">❌</button>
    ;
    cartEl.appendChild(li);
  });
}

function increase(index){
  cart[index].qty++;
  updateCart();
}

function decrease(index){
  if(cart[index].qty > 1){
    cart[index].qty--;
  } else {
    cart.splice(index,1);
  }
  updateCart();
}

function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

function sendOrder(){
  if(cart.length === 0){
    alert("السلة فارغة!");
    return;
  }

  let message = cart.map(item =>
    ${item.name} - ${item.qty}
  ).join("\n");

  let phone = "49123456789"; // حطي رقمك
  let url = https://wa.me/${phone}?text=${encodeURIComponent(message)};
  window.open(url, "_blank");
}
</script>

</body>
</html>
