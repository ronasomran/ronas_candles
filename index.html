<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Test Cart</title>
</head>

<body>

<h2>🕯️ منتجات</h2>

<button onclick="addToCart('شمعة 1', 5000)">أضف شمعة 1</button>
<button onclick="addToCart('شمعة 2', 7000)">أضف شمعة 2</button>

<h2>🛒 السلة</h2>
<ul id="cart"></ul>

<p id="total"></p>

<script>

let cart = [];

function addToCart(name, price) {
  console.log("Clicked:", name); // للتأكد

  let item = cart.find(i => i.name === name);

  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }

  updateCart();
}

function updateCart() {
  let cartEl = document.getElementById("cart");
  cartEl.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price * item.qty;

    let li = document.createElement("li");
    li.innerHTML = 
      ${item.name} - ${item.qty} × ${item.price}

      <button onclick="increase(${index})">+</button>
      <button onclick="decrease(${index})">-</button>
      <button onclick="removeItem(${index})">❌</button>
    ;

    cartEl.appendChild(li);
  });

  document.getElementById("total").innerText = "المجموع: " + total;
}

function increase(i){
  cart[i].qty++;
  updateCart();
}

function decrease(i){
  if(cart[i].qty > 1){
    cart[i].qty--;
  } else {
    cart.splice(i,1);
  }
  updateCart();
}

function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

</script>

</body>
</html>
