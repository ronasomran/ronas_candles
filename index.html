<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>متجري</title>
  <style>
    body {
      font-family: Arial;
      direction: rtl;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    button {
      background: #25d366;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🛍️ متجري</h1>

<div class="products">

  <div class="product">
    <h3>منتج 1</h3>
    <p>السعر: 10€</p>
    <button onclick="order('منتج 1', 10)">اطلب الآن</button>
  </div>

  <div class="product">
    <h3>منتج 2</h3>
    <p>السعر: 15€</p>
    <button onclick="order('منتج 2', 15)">اطلب الآن</button>
  </div>

</div>

<script>
function order(name, price) {
  const message = `مرحبا، بدي أطلب ${name} بسعر ${price}€`;
  const phone = "0980251702";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
