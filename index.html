<h1>🕯️ متجر الشموع</h1>

<div class="products">

  <div class="product">
    <h3>شمعة معطرة 1</h3>
    <p>السعر: 10€</p>
    <button onclick="order('شمعة معطرة 1', 10)">اطلب الآن</button>
  </div>

  <div class="product">
    <h3>شمعة معطرة 2</h3>
    <p>السعر: 15€</p>
    <button onclick="order('شمعة معطرة 2', 15)">اطلب الآن</button>
  </div>

</div>




<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>متجر الشموع</title>
  <style>
    body {
      font-family: Arial;
      direction: rtl;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1, h2 {
      text-align: center;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    button {
      background: #25d366;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    #cart {
      max-width: 400px;
      margin: 0 auto 20px auto;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      list-style: none;
    }
    #cart li {
      margin-bottom: 5px;
    }
  </style>
</head>

<body>


<div class="products">

  <div class="product">
    <h3>شمعة معطرة 1</h3>
    <p>السعر: 10€</p>
    <button onclick="order('شمعة معطرة 1', 10)">اطلب الآن</button>
  </div>

  <div class="product">
    <h3>شمعة معطرة 2</h3>
    <p>السعر: 15€</p>
    <button onclick="order('شمعة معطرة 2', 15)">اطلب الآن</button>
  </div>

</div>

<h2>🛒 سلة المشتريات</h2>
<ul id="cart"></ul>
<button onclick="sendOrder()">أرسل الطلب</button>

<script>
let cart = [];

function order(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  const cartEl = document.getElementById('cart');
  cartEl.innerHTML = '';
  cart.forEach(item => {
    const li = document.createElement('li');
    li.textContent = `${item.name} - ${item.price}€`;
    cartEl.appendChild(li);
  });
}

function sendOrder() {
  if(cart.length === 0) {
    alert('السلة فارغة!');
    return;
  }
  const message = cart.map(item => `${item.name} - ${item.price}€`).join('\n');
  const phone = "00963980251702"; 
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
